name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-host:
    name: Rust (host) — test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/hegemony-core
      - name: cargo test
        working-directory: crates/hegemony-core
        run: cargo test --all-targets

  rust-android:
    name: Rust (android target) — cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/hegemony-core
      - id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: cargo check --target aarch64-linux-android
        working-directory: crates/hegemony-core
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo check --target aarch64-linux-android

  wasm-build:
    name: WASM — wasm-pack build + freshness check
    runs-on: ubuntu-latest
    env:
      # Pin wasm-pack so the freshness diff is reproducible across CI runs.
      # Bump in lockstep with local dev installs.
      WASM_PACK_VERSION: "0.13.1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/hegemony-core
      - name: Install pinned wasm-pack
        run: |
          curl -sSL https://github.com/rustwasm/wasm-pack/releases/download/v${WASM_PACK_VERSION}/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz --strip-components=1 -C /usr/local/bin --wildcards '*/wasm-pack'
          wasm-pack --version
      - name: Detect stale committed WASM
        # Pure byte-diff between local build and CI rebuild is unreliable
        # (wasm-opt output varies across host architectures even with a
        # pinned wasm-pack), so we check semantically: every Mutation enum
        # variant declared in mutations.rs MUST appear as a literal
        # discriminator string in the committed WASM binary. Serde tag
        # emission guarantees these strings are baked into the .wasm at
        # compile time. Missing string ⇒ committed WASM was built before
        # that variant was added ⇒ rebuild + commit required.
        #
        # Local fix:
        #   wasm-pack build crates/hegemony-core --target web --out-dir packages/hegemony-wasm
        #   git add packages/hegemony-wasm && git commit
        run: |
          set -euo pipefail
          WASM=packages/hegemony-wasm/hegemony_core_bg.wasm
          if [ ! -f "$WASM" ]; then
            echo "::error::Committed WASM not found at $WASM"
            exit 1
          fi
          # Extract Mutation variant names. Variants are PascalCase one per
          # line, between `pub enum Mutation {` and the closing `}`. Skip
          # comments, struct-field lines, and blank lines.
          variants=$(awk '
            /^pub enum Mutation \{/ { capture=1; next }
            capture && /^\}/ { exit }
            capture && /^[[:space:]]*\/\// { next }
            capture && /^[[:space:]]*[A-Z][A-Za-z0-9_]+/ {
              # Strip leading whitespace, then take the identifier up to first non-word char.
              line=$0
              sub(/^[[:space:]]+/, "", line)
              match(line, /^[A-Z][A-Za-z0-9_]+/)
              if (RLENGTH > 0) print substr(line, RSTART, RLENGTH)
            }
          ' crates/hegemony-core/src/mutations.rs | sort -u)
          if [ -z "$variants" ]; then
            echo "::error::Could not extract Mutation variants from mutations.rs"
            exit 1
          fi
          missing=()
          for v in $variants; do
            # PascalCase → camelCase (lowercase first letter, rest unchanged).
            camel="$(printf '%s' "${v:0:1}" | tr 'A-Z' 'a-z')${v:1}"
            if ! grep -aoq -E "(^|[^A-Za-z0-9])${camel}([^A-Za-z0-9]|$)" "$WASM"; then
              missing+=("$camel")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Committed WASM is stale — missing Mutation discriminators: ${missing[*]}"
            echo "Rebuild locally:"
            echo "  wasm-pack build crates/hegemony-core --target web --out-dir packages/hegemony-wasm"
            echo "  git add packages/hegemony-wasm && git commit"
            exit 1
          fi
          echo "All ${#variants[@]} Mutation variants present as discriminator strings in committed WASM."
      - name: Build WASM (artifact for downstream web job)
        working-directory: crates/hegemony-core
        run: wasm-pack build --target web --out-dir ../../packages/hegemony-wasm
      - uses: actions/upload-artifact@v4
        with:
          name: hegemony-wasm
          path: packages/hegemony-wasm

  web:
    name: Web — typecheck, test, build
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/download-artifact@v4
        with:
          name: hegemony-wasm
          path: packages/hegemony-wasm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web typecheck
      - run: pnpm --filter web test
      - run: pnpm --filter web build

  mobile-typecheck:
    name: Mobile — typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter praxis-mobile typecheck

  security-audit:
    name: Security — pnpm + cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: pnpm install --frozen-lockfile
      # Soft-fail on PRs (informational), hard-fail on main pushes (alerts).
      - name: pnpm audit (production, high+)
        run: pnpm audit --prod --audit-level=high
        continue-on-error: ${{ github.event_name == 'pull_request' }}
      - name: cargo audit
        working-directory: crates/hegemony-core
        run: cargo audit
        continue-on-error: ${{ github.event_name == 'pull_request' }}

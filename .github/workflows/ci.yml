name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-host:
    name: Rust (host) — test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/hegemony-core
      - name: cargo test
        working-directory: crates/hegemony-core
        run: cargo test --all-targets

  rust-android:
    name: Rust (android target) — cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/hegemony-core
      - id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: cargo check --target aarch64-linux-android
        working-directory: crates/hegemony-core
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo check --target aarch64-linux-android

  wasm-build:
    name: WASM — wasm-pack build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/hegemony-core
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        working-directory: crates/hegemony-core
        run: wasm-pack build --target web --out-dir ../../packages/hegemony-wasm
      - uses: actions/upload-artifact@v4
        with:
          name: hegemony-wasm
          path: packages/hegemony-wasm

  web:
    name: Web — typecheck, test, build
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/download-artifact@v4
        with:
          name: hegemony-wasm
          path: packages/hegemony-wasm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web typecheck
      - run: pnpm --filter web test
      - run: pnpm --filter web build

  mobile-typecheck:
    name: Mobile — typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter praxis-mobile typecheck

  security-audit:
    name: Security — pnpm + cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: pnpm install --frozen-lockfile
      # Soft-fail on PRs (informational), hard-fail on main pushes (alerts).
      - name: pnpm audit (production, high+)
        run: pnpm audit --prod --audit-level=high
        continue-on-error: ${{ github.event_name == 'pull_request' }}
      - name: cargo audit
        working-directory: crates/hegemony-core
        run: cargo audit
        continue-on-error: ${{ github.event_name == 'pull_request' }}

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-host:
    name: Rust (host) — test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/hegemony-core
      - name: cargo test
        working-directory: crates/hegemony-core
        run: cargo test --all-targets

  rust-android:
    name: Rust (android target) — cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/hegemony-core
      - id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: cargo check --target aarch64-linux-android
        working-directory: crates/hegemony-core
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo check --target aarch64-linux-android

  wasm-build:
    name: WASM — wasm-pack build + freshness check
    runs-on: ubuntu-latest
    env:
      # Pin wasm-pack so the freshness diff is reproducible across CI runs.
      # Bump in lockstep with local dev installs.
      WASM_PACK_VERSION: "0.13.1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/hegemony-core
      - name: Install pinned wasm-pack
        run: |
          curl -sSL https://github.com/rustwasm/wasm-pack/releases/download/v${WASM_PACK_VERSION}/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz --strip-components=1 -C /usr/local/bin --wildcards '*/wasm-pack'
          wasm-pack --version
      - name: Detect stale committed WASM
        # Pure byte-diff between local build and CI rebuild is unreliable
        # (wasm-opt output varies across host architectures even with a
        # pinned wasm-pack), so we check semantically: every Mutation enum
        # variant declared in mutations.rs MUST appear as a literal
        # discriminator string in the committed WASM binary. Serde tag
        # emission guarantees these strings are baked into the .wasm at
        # compile time. Missing string ⇒ committed WASM was built before
        # that variant was added ⇒ rebuild + commit required.
        #
        # Local fix:
        #   wasm-pack build crates/hegemony-core --target web --out-dir packages/hegemony-wasm
        #   git add packages/hegemony-wasm && git commit
        run: |
          set -uo pipefail
          WASM=packages/hegemony-wasm/hegemony_core_bg.wasm
          if [ ! -f "$WASM" ]; then
            echo "::error::Committed WASM not found at $WASM"
            exit 1
          fi
          # Extract Mutation variant names via grep (more portable than awk
          # capture-block state machines). Variants are unique within the
          # file: lines that start with PascalCase identifier followed by
          # `{` or `,` or whitespace, INSIDE the `pub enum Mutation { ... }`
          # block. We use sed to clip just that block first, then grep.
          block=$(sed -n '/^pub enum Mutation {/,/^}/p' crates/hegemony-core/src/mutations.rs)
          if [ -z "$block" ]; then
            echo "::error::Could not locate 'pub enum Mutation' block in mutations.rs"
            exit 1
          fi
          variants=$(printf '%s\n' "$block" \
            | grep -E '^[[:space:]]+[A-Z][A-Za-z0-9_]+' \
            | sed -E 's/^[[:space:]]+([A-Z][A-Za-z0-9_]+).*/\1/' \
            | sort -u)
          variant_count=$(printf '%s\n' "$variants" | grep -c .)
          if [ "$variant_count" -eq 0 ]; then
            echo "::error::Extracted 0 Mutation variants — extraction logic broken"
            exit 1
          fi
          echo "Extracted $variant_count Mutation variants:"
          printf '  - %s\n' $variants
          echo ""
          missing=""
          missing_count=0
          for v in $variants; do
            # PascalCase → camelCase (lowercase first letter, rest unchanged).
            head_lower=$(printf '%s' "$v" | cut -c1 | tr 'A-Z' 'a-z')
            tail=$(printf '%s' "$v" | cut -c2-)
            camel="${head_lower}${tail}"
            # `grep -aoq` is portable across BSD and GNU; binary content
            # treated as text via -a. Plain string match (no regex anchors)
            # avoids false-negatives from oddly-aligned bytes around the
            # discriminator inside the wasm data section.
            if ! grep -aFq "$camel" "$WASM"; then
              missing="$missing $camel"
              missing_count=$((missing_count + 1))
            fi
          done
          if [ "$missing_count" -gt 0 ]; then
            echo "::error::Committed WASM is stale — missing Mutation discriminators:$missing"
            echo "Rebuild locally:"
            echo "  wasm-pack build crates/hegemony-core --target web --out-dir packages/hegemony-wasm"
            echo "  git add packages/hegemony-wasm && git commit"
            exit 1
          fi
          echo "All $variant_count Mutation variants present as discriminator strings in committed WASM."
      - name: Build WASM (artifact for downstream web job)
        working-directory: crates/hegemony-core
        run: wasm-pack build --target web --out-dir ../../packages/hegemony-wasm
      - uses: actions/upload-artifact@v4
        with:
          name: hegemony-wasm
          path: packages/hegemony-wasm

  web:
    name: Web — typecheck, test, build
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4
      # Pinned to a specific tag rather than floating @v4 — the latter
      # occasionally 502s during action download (web job flake on
      # commits 4fd5877..e952c8a).
      - uses: pnpm/action-setup@v4.0.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/download-artifact@v4
        with:
          name: hegemony-wasm
          path: packages/hegemony-wasm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web typecheck
      - run: pnpm --filter web test
      - run: pnpm --filter web build

  mobile-typecheck:
    name: Mobile — typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to a specific tag rather than floating @v4 — the latter
      # occasionally 502s during action download (web job flake on
      # commits 4fd5877..e952c8a).
      - uses: pnpm/action-setup@v4.0.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter praxis-mobile typecheck

  security-audit:
    name: Security — pnpm + cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to a specific tag rather than floating @v4 — the latter
      # occasionally 502s during action download (web job flake on
      # commits 4fd5877..e952c8a).
      - uses: pnpm/action-setup@v4.0.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      # Cache cargo-audit binary AND the RustSec advisory-db git clone.
      # cargo-audit otherwise re-clones https://github.com/RustSec/advisory-db
      # on every run; that's hit Actions runner network flakes / GitHub
      # rate limits before. Cache key uses a yyyymm bucket so the DB
      # refreshes monthly.
      - name: Cache cargo-audit + advisory-db
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/advisory-db
          key: cargo-audit-${{ runner.os }}-$(date -u +%Y%m)
          restore-keys: cargo-audit-${{ runner.os }}-
      - name: Install cargo-audit (skip if cached)
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked
          fi
      - run: pnpm install --frozen-lockfile
      # Soft-fail on PRs (informational), hard-fail on main pushes (alerts).
      - name: pnpm audit (production, high+)
        run: pnpm audit --prod --audit-level=high
        continue-on-error: ${{ github.event_name == 'pull_request' }}
      - name: cargo audit
        working-directory: crates/hegemony-core
        # `-n` skips the network fetch when the advisory-db is restored
        # from cache; falls back to fetch when cache is cold.
        run: |
          if [ -d ~/.cargo/advisory-db ]; then
            cargo audit -n
          else
            cargo audit
          fi
        continue-on-error: ${{ github.event_name == 'pull_request' }}
